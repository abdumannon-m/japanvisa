name: Visa Slot Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: visa-monitor
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore monitor state
        uses: actions/cache@v6
        with:
          path: state.json
          key: visa-state-${{ github.run_id }}
          restore-keys: visa-state-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          STATE_KEY: "event-20"
          EVENT_ID: "20"
          CATEGORY_ID: "12"
          PLAN_ID: "19"
          MONTHS_AHEAD: "2"
          EVENT_LABEL: "Short stay - Applicant"
          STATUS_INTERVAL_SECONDS: "3600"
          LOOP_SECONDS: "60"
          TELEGRAM_POLL_INTERVAL_SECONDS: "5"
          LOOP_DURATION_SECONDS: "21000"
        run: |
          set +e
          timeout "${LOOP_DURATION_SECONDS}s" python check_slots.py --loop "$LOOP_SECONDS" --telegram-poll-interval "$TELEGRAM_POLL_INTERVAL_SECONDS"
          code=$?
          if [ "$code" -eq 124 ]; then
            echo "Monitor loop reached planned duration"
            exit 0
          fi
          exit "$code"
